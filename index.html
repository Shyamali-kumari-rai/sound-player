<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musicify</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
    <div class="logo">
        <i class="fa-solid fa-music"></i>
        <h2>Musicify</h2>
    </div>

    <ul class="menu">
        <li class="active"><i class="fa-solid fa-house"></i> Home</li>
        <li><i class="fa-solid fa-fire"></i> Trending</li>
        <li><i class="fa-solid fa-compact-disc"></i> Albums</li>
        <li><i class="fa-solid fa-list"></i> Playlist</li>
        <li><i class="fa-solid fa-heart"></i> Favorites</li>
    </ul>
</aside>

<!-- Main -->
<main class="main-content">

<header class="topbar">
    <div class="search">
        <i class="fa-solid fa-search"></i>
        <input type="text" placeholder="Search songs...">
    </div>
    <i class="fa-solid fa-user profile"></i>
</header>

<section class="banner">
    <div>
        <h1>Feel The Music</h1>
        <p>Listen anywhere</p>
        <button>Explore</button>
    </div>
    <img src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=800">
</section>

<!-- Songs -->
<section class="playlist">
<h2>Popular Songs</h2>

<div class="song-list">

<div class="song active" data-song="song/music1.mp3" data-cover="images/cover1.jpg">
<img src="assets/piano.png"><div><h3>Dreams</h3><p>Unknown</p></div><i class="fa-solid fa-play"></i>
</div>

<div class="song" data-song="song/music2.mp3" data-cover="images/cover2.jpg">
<img src="assets/sky.png"><div><h3>Night Sky</h3><p>Unknown</p></div><i class="fa-solid fa-play"></i>
</div>

<div class="song" data-song="song/music3.mp3" data-cover="images/cover3.jpg">
<img src="assets/sunny.jpg"><div><h3>Summer</h3><p>Unknown</p></div><i class="fa-solid fa-play"></i>
</div>

<div class="song" data-song="song/music4.mp3" data-cover="images/cover4.jpg">
<img src="assets/relax.jpg"><div><h3>Relax</h3><p>Unknown</p></div><i class="fa-solid fa-play"></i>
</div>

</div>
</section>

</main>
</div>

<!-- Player -->
<footer class="player">

<div class="player-left">
    <img id="cover" src="assets/play.jpg">
    <div>
        <h3 id="title">Dreams</h3>
        <p id="artist">Unknown Artist</p>
    </div>
</div>

<div class="player-center">

<div class="controls">
<button id="prev"><i class="fa-solid fa-backward"></i></button>
<button id="play"><i class="fa-solid fa-play"></i></button>
<button id="next"><i class="fa-solid fa-forward"></i></button>
</div>

<div class="progress">
<span id="current">0:00</span>
<input type="range" id="progress" value="0">
<span id="duration">0:00</span>
</div>

</div>

<div class="player-right">
<i class="fa-solid fa-volume-high"></i>
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">
</div>

</footer>

<audio id="audio"></audio>
<script src="script.js"></script>

</body>
</html>
